name: 'Discord Webhook'

on:
  workflow_call:
    inputs:
      event_discussion_html_url:
        required: true
        type: string
      event_discussion_title:
        required: true
        type: string
      event_issue_html_url:
        required: true
        type: string
      event_issue_title:
        required: true
        type: string
      event_name:
        required: true
        type: string
      event_pull_request_html_url:
        required: true
        type: string
      event_pull_request_title:
        required: true
        type: string
      event_sender_avatar_url:
        required: true
        type: string
      event_sender_html_url:
        required: true
        type: string
      event_sender_login:
        required: true
        type: string
      repository_name:
        required: true
        type: string
    secrets:
      env_discord:
        required: true

jobs:
  message:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        env:
          EVENT_NAME: ${{ inputs.event_name }}
          DISCUSSION_TITLE: ${{ inputs.event_discussion_title }}
          DISCUSSION_URL: ${{ inputs.event_discussion_html_url }}
          ISSUE_TITLE: ${{ inputs.event_issue_title }}
          ISSUE_URL: ${{ inputs.event_issue_html_url }}
          PR_TITLE: ${{ inputs.event_pull_request_title }}
          PR_URL: ${{ inputs.event_pull_request_html_url }}
          REPO_NAME: ${{ inputs.repository_name }}
          SENDER_LOGIN: ${{ inputs.event_sender_login }}
          SENDER_HTML_URL: ${{ inputs.event_sender_html_url }}
          SENDER_AVATAR_URL: ${{ inputs.event_sender_avatar_url }}
          DISCORD_WEBHOOK: ${{ secrets.env_discord }}
        run: |
          if [ "$EVENT_NAME" = "discussion" ]; then
            title="$DISCUSSION_TITLE"
            url="$DISCUSSION_URL"
            description="A **discussion** has been created in $REPO_NAME."
            color=16305330
          elif [ "$EVENT_NAME" = "issues" ]; then
            title="$ISSUE_TITLE"
            url="$ISSUE_URL"
            description="An **issue** has been opened in $REPO_NAME."
            color=14023876
          elif [ "$EVENT_NAME" = "pull_request_target" ]; then
            title="$PR_TITLE"
            url="$PR_URL"
            description="A **pull request** has been opened in $REPO_NAME."
            color=7317724
          fi

          payload=$(jq -n \
            --arg author_name "$SENDER_LOGIN" \
            --arg author_url "$SENDER_HTML_URL" \
            --arg author_icon "$SENDER_AVATAR_URL" \
            --arg title "$title" \
            --arg url "$url" \
            --arg description "$description" \
            --arg color "$color" \
            '{
              username: "GitHub",
              avatar_url: "https://avatars.githubusercontent.com/u/9919?s=200&v=4",
              embeds: [{
                author: { name: $author_name, url: $author_url, icon_url: $author_icon },
                title: $title,
                url: $url,
                description: $description,
                color: $color
              }]
            }')

          curl -s -X POST "$DISCORD_WEBHOOK" -H "Content-Type: application/json" -d "$payload"
